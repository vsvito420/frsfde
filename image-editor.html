<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Bild rund zuschneiden</title>
<style>
    body {
        background:#111;
        color:white;
        font-family:Arial, sans-serif;
        text-align:center;
        padding:30px;
    }

    canvas {
        margin-top:20px;
        background:transparent;
        max-width:300px;
        border:1px solid #444;
    }

    input, button {
        margin:12px;
        padding:10px 16px;
        font-size:16px;
    }

    button {
        cursor:pointer;
    }
</style>
</head>
<body>

<h1>Bild rund zuschneiden</h1>
<p>JPG hochladen → schwarzer Hintergrund wird entfernt → rundes PNG herunterladen</p>

<input type="file" id="upload" accept="image/*">
<br>

<canvas id="canvas"></canvas>
<br>

<button onclick="downloadImage()">PNG herunterladen</button>

<script>
const upload = document.getElementById("upload");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

upload.addEventListener("change", function () {
    const file = this.files[0];
    if (!file) return;

    const img = new Image();
    img.onload = function () {
        const size = Math.min(img.width, img.height);

        canvas.width = size;
        canvas.height = size;

        ctx.clearRect(0, 0, size, size);

        const sx = (img.width - size) / 2;
        const sy = (img.height - size) / 2;

        ctx.save();

        ctx.beginPath();
        ctx.arc(size / 2, size / 2, size / 2, 0, Math.PI * 2);
        ctx.closePath();
        ctx.clip();

        ctx.drawImage(img, sx, sy, size, size, 0, 0, size, size);

        ctx.restore();

        removeBlackBackground();
    };

    img.src = URL.createObjectURL(file);
});

function removeBlackBackground() {
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;

    for (let i = 0; i < data.length; i += 4) {
        const r = data[i];
        const g = data[i + 1];
        const b = data[i + 2];

        // Alles, was fast schwarz ist, transparent machen
        if (r < 35 && g < 35 && b < 35) {
            data[i + 3] = 0;
        }
    }

    ctx.putImageData(imageData, 0, 0);
}

function downloadImage() {
    const link = document.createElement("a");
    link.download = "fresh-fade-rund.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
}
</script>

</body>
</html>
